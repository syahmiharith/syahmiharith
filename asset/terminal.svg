<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated terminal banner for syahmiharith</title>
  <desc id="desc">A dark terminal window with animated command text and a blinking cursor.</desc>
  <style>
    .bg { fill: #0b1220; }
    .panel { fill: #101827; stroke: #263244; stroke-width: 1; }
    .bar { fill: #172033; }
    .muted { fill: #7d8da8; font: 500 16px Consolas, Monaco, monospace; }
    .prompt { fill: #2dd4bf; font: 700 20px Consolas, Monaco, monospace; }
    .text { fill: #e5eefc; font: 700 20px Consolas, Monaco, monospace; }
    .soft { fill: #a9b8d0; font: 500 16px Consolas, Monaco, monospace; }
    .cursor { fill: #f8fafc; }
    .type1 { animation: show1 9s infinite; }
    .type2 { animation: show2 9s infinite; opacity: 0; }
    .type3 { animation: show3 9s infinite; opacity: 0; }
    .cursor { animation: blink 1s steps(1) infinite; }
    @keyframes show1 {
      0%, 28% { opacity: 1; }
      34%, 100% { opacity: 0; }
    }
    @keyframes show2 {
      0%, 33% { opacity: 0; }
      39%, 61% { opacity: 1; }
      67%, 100% { opacity: 0; }
    }
    @keyframes show3 {
      0%, 66% { opacity: 0; }
      72%, 96% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }
  </style>
  <rect class="bg" width="900" height="260" rx="16"/>
  <rect class="panel" x="35" y="32" width="830" height="196" rx="12"/>
  <rect class="bar" x="35" y="32" width="830" height="42" rx="12"/>
  <circle cx="62" cy="53" r="6" fill="#ef4444"/>
  <circle cx="84" cy="53" r="6" fill="#f59e0b"/>
  <circle cx="106" cy="53" r="6" fill="#22c55e"/>
  <text class="muted" x="450" y="59" text-anchor="middle">github-profile/readme.md</text>
  <text class="prompt" x="72" y="118">$</text>
  <g class="type1">
    <text class="text" x="100" y="118">build profile --interactive</text>
    <text class="soft" x="72" y="158">Loading collapsible sections, live stats, and project links...</text>
  </g>
  <g class="type2">
    <text class="text" x="100" y="118">open command-palette</text>
    <text class="soft" x="72" y="158">whoami · now · values · collab</text>
  </g>
  <g class="type3">
    <text class="text" x="100" y="118">ship useful work</text>
    <text class="soft" x="72" y="158">Clean READMEs. Practical projects. Better every commit.</text>
  </g>
  <rect class="cursor" x="352" y="100" width="11" height="24" rx="2"/>
  <path d="M62 192H838" stroke="#263244" stroke-width="1"/>
  <text class="soft" x="72" y="213">syahmiharith@github</text>
</svg>
